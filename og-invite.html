<!doctype html>
<!--
  OG card source — renders to a 1200×630 PNG used as og:image on
  invite.html. NOT deployed publicly; kept in the repo so the design
  is version-controlled and easy to re-export.

  To regenerate the PNG (from repo root):
    /Applications/Google\ Chrome.app/Contents/MacOS/Google\ Chrome \
      --headless --disable-gpu \
      --screenshot=public/og-invite.png \
      --window-size=1200,630 \
      "file://$PWD/og-invite.html"
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    /* Fix the body to exactly 1200x630 so headless Chrome captures
       the card pixel-perfect with no scrollbars or padding. */
    html, body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                   'Segoe UI', Roboto, Inter, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #E8E4D9;
    }
    body {
      /* Layered radial gradients on a teal-tinted near-black base. */
      background:
        radial-gradient(1000px 700px at 80% 10%, rgba(224,120,86,.30), transparent 60%),
        radial-gradient(1100px 700px at 10% 100%, rgba(15,61,62,.80), transparent 60%),
        #0C1413;
      display: grid;
      grid-template-columns: 320px 1fr;
      align-items: center;
      gap: 64px;
      padding: 0 96px;
      box-sizing: border-box;
    }
    .logo-wrap {
      display: grid;
      place-items: center;
    }
    .logo-img {
      width: 320px;
      height: 320px;
      object-fit: contain;
      border-radius: 64px;
      /* Soft terracotta glow under the logo */
      filter: drop-shadow(0 20px 60px rgba(224, 120, 86, 0.35));
    }
    .copy {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    h1 {
      margin: 0;
      font-size: 72px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.025em;
      color: #E8E4D9;
    }
    h1 .accent {
      color: #E07856;
    }
    .domain {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #5F5A52;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img class="logo-img" src="public/splitrick.png" alt="SplitRick">
  </div>
  <div class="copy">
    <h1>You've been <span class="accent">invited</span><br>to join a group!</h1>
  </div>
</body>
</html>
