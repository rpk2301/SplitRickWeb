<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Join a SplitRick group</title>

  <meta name="description" content="You've been invited to join a group on SplitRick.">
  <meta name="theme-color" content="#0C1413">
  <link rel="icon" href="/splitrick.png" type="image/png">

  <!-- Open Graph for iMessage/WhatsApp/Slack rich previews -->
  <meta property="og:site_name" content="SplitRick">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://splitrick.click/invite.html">
  <meta property="og:title" content="You've been invited to join a group!">
  <meta property="og:image" content="https://splitrick.click/og-invite.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="You've been invited to join a group!">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="You've been invited to join a group!">
  <meta name="twitter:image" content="https://splitrick.click/og-invite.png">

  <style>
    :root {
      --bg:         #0C1413;
      --card:       #152220;
      --border:     #1F3330;
      --accent:     #E07856;
      --accent-deep:#C56340;
      --sage:       #B5C18E;
      --sand:       #E8E4D9;
      --muted:      #9A948A;
      --subtle:     #5F5A52;
    }
    * { box-sizing: border-box; }
    html { height: 100%; }
    body {
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Display",
            "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      color: var(--sand);
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    }

    /* Soft accent glow — subtle, not the purple blob from before */
    body::before {
      content: "";
      position: fixed;
      top: -240px; left: 50%;
      width: 700px; height: 700px;
      transform: translateX(-50%);
      background: radial-gradient(closest-side, rgba(224,120,86,0.18), transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* Card */
    main {
      width: 100%;
      max-width: 440px;
      margin: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 36px 28px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* Logo — real app icon, not a placeholder letter */
    .logo {
      width: 84px;
      height: 84px;
      margin: 0 auto 24px;
      border-radius: 20px;
      display: block;
      box-shadow: 0 12px 30px rgba(224, 120, 86, 0.28);
    }

    h1 {
      font-size: clamp(22px, 6vw, 26px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin: 0 0 8px;
      color: var(--sand);
    }
    .tagline {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 28px;
      line-height: 1.5;
    }

    /* Code block — same font weight/family as the rest of the page */
    .code-block {
      margin: 0 0 24px;
      padding: 18px 16px;
      background: rgba(224,120,86,0.06);
      border: 1px solid rgba(224,120,86,0.18);
      border-radius: 14px;
    }
    .code-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin: 0 0 6px;
    }
    .code-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--sand);
      margin: 0;
      font-variant-numeric: tabular-nums;
    }

    /* Primary CTA — full-width mobile friendly */
    .cta {
      display: block;
      width: 100%;
      padding: 15px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      background: var(--accent);
      color: #fff;
      border: 0;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s ease, transform 0.08s ease;
    }
    .cta:hover { background: var(--accent-deep); }
    .cta:active { transform: translateY(1px); }
    .cta[disabled] { opacity: 0.4; pointer-events: none; }

    .fallback {
      margin: 16px 0 0;
      font-size: 13px;
      color: var(--subtle);
    }
    .fallback a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .fallback a:hover { color: var(--accent-deep); }

    /* Footer outside the card */
    footer {
      text-align: center;
      padding: 20px 0 12px;
      color: var(--subtle);
      font-size: 12px;
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
    }
    footer a:hover { color: var(--sand); }

    /* Tighter padding on small screens */
    @media (max-width: 380px) {
      main { padding: 28px 20px 22px; border-radius: 18px; }
      .logo { width: 72px; height: 72px; margin-bottom: 20px; }
      .code-block { padding: 14px; }
    }
  </style>
</head>
<body>

  <main>
    <img class="logo" src="splitrick.png" alt="SplitRick">
    <h1>You're invited!</h1>
    <p class="tagline">Open SplitRick to join this group and start splitting expenses together.</p>

    <div class="code-block">
      <p class="code-label">Invite code</p>
      <p class="code-value" id="codeDisplay">—</p>
    </div>

    <a class="cta" id="openAppBtn" href="#">Open in SplitRick</a>

    <p class="fallback">
      Don't have the app?
      <a id="storeLink" href="https://splitrick.click">Request beta access</a>
    </p>
  </main>

  <footer>
    © <span id="year"></span> SplitRick · <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a>
  </footer>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const code = (params.get('code') || '').replace(/[^0-9]/g, '').slice(0, 6);

      const codeEl = document.getElementById('codeDisplay');
      const appBtn = document.getElementById('openAppBtn');

      if (!code) {
        codeEl.textContent = '—';
        appBtn.textContent = 'Invalid invite';
        appBtn.setAttribute('disabled', 'disabled');
        appBtn.setAttribute('aria-disabled', 'true');
        return;
      }

      codeEl.textContent = code;

      // Custom-scheme deep link into the iOS app.
      // If the app is installed, iOS intercepts immediately. If not,
      // the App Store link in .fallback is the next best destination —
      // we don't auto-redirect because there's no App Store listing yet
      // during the beta.
      const appURL = 'splitrick://join/' + encodeURIComponent(code);
      appBtn.href = appURL;

      // Year in footer
      const yearEl = document.getElementById('year');
      if (yearEl) yearEl.textContent = new Date().getFullYear();
    })();
  </script>
</body>
</html>
